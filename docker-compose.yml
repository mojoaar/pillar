version: '3.8'

services:
  pillar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pillar-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/pillar.db?connection_limit=1
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - GUACD_HOST=guacd
      - GUACD_PORT=4822
    volumes:
      # Mount persistent local storage volumes for SQLite databases and user uploads
      - pillar-data:/app/data
      - pillar-uploads:/app/public/uploads
    depends_on:
      - guacd

  # Apache Guacamole daemon sidecar container managing RDP, VNC, and SSH protocol translation (Phase 10)
  guacd:
    image: guacamole/guacd:1.5.4
    container_name: pillar-guacd
    restart: unless-stopped
    environment:
      - GUACD_LOG_LEVEL=debug

volumes:
  pillar-data:
    driver: local
  pillar-uploads:
    driver: local
